services:
  sandbox:
    build:
      context: ./ScienceClaw/sandbox
      dockerfile: Dockerfile.china
    image: scienceclaw-sandbox:custom
    security_opt:
      - seccomp:unconfined
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "2gb"
    mem_limit: ${SANDBOX_MEM_LIMIT:-8g}
    cpus: ${SANDBOX_CPUS:-4}
    environment:
      TZ: Asia/Shanghai
      WEBSEARCH_URL: http://websearch:8068
    volumes:
      - ./Skills:/skills:ro
      - ./Tools:/app/Tools:ro
      - ./ScienceClaw/backend/builtin_skills:/builtin-skills:ro
      - ./workspace:/home/scienceclaw
    ports:
      - "18080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/v1/docs >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  mongo:
    build:
      context: ./ScienceClaw/mongo
      dockerfile: Dockerfile.china
    image: scienceclaw-mongo:custom
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-scienceone}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
    ports:
      - "27014:27017"
    volumes:
      - scienceclaw_mongo_data:/data/db
    restart: unless-stopped

  redis:
    build:
      context: ./ScienceClaw/redis
      dockerfile: Dockerfile.china
    image: scienceclaw-redis:custom
    restart: unless-stopped

  searxng:
    build:
      context: ./ScienceClaw/searxng
      dockerfile: Dockerfile.china
    image: scienceclaw-searxng:custom
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
      SEARXNG_LIMITER: "false"
      TZ: Asia/Shanghai
    volumes:
      - ./ScienceClaw/websearch/config/settings.yml:/etc/searxng/settings.yml
    ports:
      - "26080:8080"
    restart: unless-stopped

  websearch:
    build:
      context: ./ScienceClaw/websearch
      dockerfile: Dockerfile.china
    image: scienceclaw-websearch:custom
    environment:
      SEARXNG_HOST: searxng
      SEARXNG_PORT: 8080
      API_HOST: "0.0.0.0"
      API_PORT: 8068
      TZ: Asia/Shanghai
      API_KEY: ${WEBSEARCH_API_KEY:?WEBSEARCH_API_KEY is required}
    ports:
      - "8068:8068"
    restart: unless-stopped
    depends_on:
      searxng:
        condition: service_started

  backend:
    build:
      context: ./ScienceClaw/backend
      dockerfile: Dockerfile.china
    image: scienceclaw-backend:custom
    volumes:
      - ./ScienceClaw/backend:/app/backend
      - ./ScienceClaw/backend/builtin_skills:/app/builtin_skills:ro
      - ./Tools:/app/Tools
      - ./Skills:/app/Skills
      - ./workspace:/home/scienceclaw
    environment:
      SANDBOX_REST_URL: http://sandbox:8080
      WORKSPACE_DIR: /home/scienceclaw
      DS_API_KEY: ${API_KEY:-}
      DS_URL: ${DS_URL:-https://api.deepseek.com/v1}
      DS_MODEL: ${DS_MODEL:-deepseek-chat}
      TEMPERATURE: ${TEMPERATURE:-0.7}
      MAX_TOKENS: ${MAX_TOKENS:-2000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FILE_DOWNLOAD_ALLOWED_PREFIXES: /tmp,/app,/home/scienceclaw
      TZ: Asia/Shanghai
      AUTH_PROVIDER: local
      BOOTSTRAP_ADMIN_ENABLED: "true"
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?BOOTSTRAP_ADMIN_PASSWORD is required}
      BOOTSTRAP_ADMIN_FULLNAME: ${BOOTSTRAP_ADMIN_FULLNAME:-Administrator}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@localhost}
      BOOTSTRAP_UPDATE_ADMIN_PASSWORD: "true"
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_USER: ${MONGO_INITDB_ROOT_USERNAME:-scienceone}
      MONGODB_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      TASK_SERVICE_API_KEY: ${TASK_SERVICE_API_KEY:-}
      WEBSEARCH_API_KEY: ${WEBSEARCH_API_KEY:?WEBSEARCH_API_KEY is required}
      WEBSEARCH_BASE_URL: http://websearch:8068
      WEBSEARCH_URL: http://websearch:8068
      IM_ENABLED: "true"
      IM_RESPONSE_TIMEOUT: 300
      IM_MAX_MESSAGE_LENGTH: 4000
      LARK_ENABLED: "true"
      LARK_APP_ID: ${LARK_APP_ID:-}
      LARK_APP_SECRET: ${LARK_APP_SECRET:-}
      ERP_BASE_URL: ${ERP_BASE_URL:?ERP_BASE_URL is required}
      ERP_APP_ID: ${ERP_APP_ID:?ERP_APP_ID is required}
      ERP_APP_SECRET: ${ERP_APP_SECRET:?ERP_APP_SECRET is required}
      ERP_APPLICATION_ID: ${ERP_APPLICATION_ID:-120201165}
      MODEL_TEMPERATURE: ${MODEL_TEMPERATURE:-0.2}
      MODEL_TOP_P: ${MODEL_TOP_P:-0.95}
      MODEL_TOP_K: ${MODEL_TOP_K:-20}
      MODEL_ENABLE_THINKING: ${MODEL_ENABLE_THINKING:-false}
      FRONTEND_ENDPOINT: ${FRONTEND_ENDPOINT:?未知的前端路径}
      WATCHFILES_FORCE_POLLING: "1"
    ports:
      - "12001:8000"
    command: >
      python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend
    restart: unless-stopped
    depends_on:
      sandbox:
        condition: service_started
      mongo:
        condition: service_started
      websearch:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/auth/status >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  scheduler_api:
    build:
      context: ./ScienceClaw/task-service
      dockerfile: Dockerfile.china
    image: scienceclaw-task-service:custom
    volumes:
      - ./ScienceClaw/task-service:/app
    environment:
      TZ: Asia/Shanghai
      DISPLAY_TIMEZONE: ${DISPLAY_TIMEZONE:-Asia/Shanghai}
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DB: ai_agent
      MONGODB_USER: ${MONGO_INITDB_ROOT_USERNAME:-scienceone}
      MONGODB_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      REDIS_URL: redis://redis:6379/0
      CHAT_SERVICE_URL: http://backend:8000
      CHAT_SERVICE_API_KEY: ${TASK_SERVICE_API_KEY:-}
      DS_API_KEY: ${DS_API_KEY:-}
      DS_URL: ${DS_URL:-https://api.deepseek.com/v1}
      DS_MODEL: ${DS_MODEL:-deepseek-chat}
    ports:
      - "12002:8001"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      backend:
        condition: service_started

  celery_worker:
    image: scienceclaw-task-service:custom
    pull_policy: never
    volumes:
      - ./ScienceClaw/task-service:/app
    environment:
      TZ: Asia/Shanghai
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DB: ai_agent
      MONGODB_USER: ${MONGO_INITDB_ROOT_USERNAME:-scienceone}
      MONGODB_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      REDIS_URL: redis://redis:6379/0
      CHAT_SERVICE_URL: http://backend:8000
      CHAT_SERVICE_API_KEY: ${TASK_SERVICE_API_KEY:-}
    command: celery -A app.celery_app worker --loglevel=info
    restart: unless-stopped
    depends_on:
      scheduler_api:
        condition: service_started
      redis:
        condition: service_started
      backend:
        condition: service_started

  celery_beat:
    image: scienceclaw-task-service:custom
    pull_policy: never
    volumes:
      - ./ScienceClaw/task-service:/app
    environment:
      TZ: Asia/Shanghai
      MONGODB_HOST: mongo
      MONGODB_PORT: 27017
      MONGODB_DB: ai_agent
      MONGODB_USER: ${MONGO_INITDB_ROOT_USERNAME:-scienceone}
      MONGODB_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      REDIS_URL: redis://redis:6379/0
    command: celery -A app.celery_app beat --loglevel=info
    restart: unless-stopped
    depends_on:
      scheduler_api:
        condition: service_started
      redis:
        condition: service_started

  # 前端采用“重启即重建产物”的运行方式：
  # 修改代码后 `docker compose -f docker-compose-custom.yml restart frontend` 即可生效
  frontend:
    image: swr.cn-north-4.myhuaweicloud.com/claw/node:20-bookworm-slim
    working_dir: /app
    environment:
      BACKEND_URL: http://backend:8000
      TASK_SERVICE_URL: http://scheduler_api:8001
      VITE_DISPLAY_TIMEZONE: ${DISPLAY_TIMEZONE:-Asia/Shanghai}
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
      NPM_CONFIG_CACHE: /npm-cache
      TZ: Asia/Shanghai
    volumes:
      - ./ScienceClaw/frontend:/app
      - scienceclaw_frontend_node_modules:/app/node_modules
      - scienceclaw_frontend_npm_cache:/npm-cache
    ports:
      - "5173:4173"
    command: >
      sh -lc "npm install --no-fund --no-audit && npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      scheduler_api:
        condition: service_started

volumes:
  scienceclaw_mongo_data:
  scienceclaw_frontend_node_modules:
  scienceclaw_frontend_npm_cache:
